<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Luxury Stay</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 500;
            color: var(--primary-color);
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #eee;
            background-color: #fcfcfc;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(201, 162, 39, 0.1);
        }

        .status-box {
            margin: 0 auto 3rem;
            max-width: 600px;
            text-align: center;
            padding: 1.5rem;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            font-weight: 500;
        }

        .total-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin: 2rem 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">LUXURY STAY</div>
        <div class="nav-toggle" id="nav-toggle">
            <i class="fas fa-bars"></i>
        </div>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="rooms.html">Rooms</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="booking.html" class="active">Book Now</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <h2 class="section-title fade-in">Reserve Your Room</h2>

            <div id="availabilityStatus" class="status-box reveal">
                Current Availability: <span id="availableRoomsCount" style="font-weight: 700;">50</span> Luxury Rooms
            </div>

            <div class="form-container reveal">
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="bName">Full Name</label>
                        <input type="text" id="bName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="bMobile">Mobile Number</label>
                        <input type="tel" id="bMobile" placeholder="Enter your mobile number" required>
                    </div>
                    <div class="form-group">
                        <label for="bRooms">Number of Rooms</label>
                        <input type="number" id="bRooms" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="bDays">Number of Occupancy Days</label>
                        <input type="number" id="bDays" min="1" value="1" required>
                    </div>
                    <div id="totalPriceDisplay" class="total-price">Total Price: ₹500</div>
                    <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Confirm
                        Booking</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <div class="logo">LUXURY STAY</div>
                <p>Elegant living in the heart of the city.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="rooms.html">Rooms</a></li>
                    <li><a href="booking.html">Book Now</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Follow Us</h4>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Joelx Orbit. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
